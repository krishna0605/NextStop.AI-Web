name: Post Deploy Verify

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed application URL"
        required: true
        type: string
      backend_health_url:
        description: "Backend health endpoint URL"
        required: false
        type: string
      hosted_verification_results_json:
        description: "Optional JSON object with manual durable-flow scenario results"
        required: false
        type: string
      certify_launch:
        description: "Issue a launch certification if all checks are green"
        required: false
        default: false
        type: boolean
      certification_owner:
        description: "Owner recorded on launch certification"
        required: false
        type: string
      certification_notes:
        description: "Notes recorded on launch certification"
        required: false
        type: string
  schedule:
    - cron: "17 * * * *"
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || vars.PRODUCTION_BASE_URL }}
  BACKEND_HEALTH_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.backend_health_url || vars.BACKEND_HEALTH_URL }}
  AI_CORE_SHARED_SECRET: ${{ secrets.AI_CORE_SHARED_SECRET }}

jobs:
  readiness-check:
    if: ${{ ((github.event_name == 'workflow_dispatch' && inputs.base_url != '') || (github.event_name != 'workflow_dispatch' && vars.PRODUCTION_BASE_URL != '')) && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      launch_decision: ${{ steps.certify_readiness.outputs.launch_decision }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --workspaces=false
        working-directory: frontend
      - run: npm run test:readiness -- ${{ env.BASE_URL }} --service-only
        working-directory: frontend
      - name: Certify launch decision
        id: certify_readiness
        shell: bash
        run: |
          HTTP_STATUS="$(curl --silent --show-error --output readiness.json --write-out "%{http_code}" "${{ env.BASE_URL }}/api/health/readiness")"
          HTTP_STATUS="$HTTP_STATUS" node <<'NODE'
          const fs = require("fs");
          const payload = JSON.parse(fs.readFileSync("readiness.json", "utf8"));
          const httpStatus = process.env.HTTP_STATUS;
          if (!["200", "503"].includes(httpStatus)) {
            throw new Error(`Unexpected readiness HTTP status: ${httpStatus}`);
          }
          if (!["ready", "degraded", "blocked"].includes(payload.launchDecision)) {
            throw new Error("Readiness payload missing launchDecision");
          }
          const allowedEvidenceBlockers = new Set([
            "Hosted verification",
            "Launch certification",
            "Production observability",
          ]);
          const unexpectedBlockers = (payload.blockingFailures ?? []).filter(
            (failure) => !allowedEvidenceBlockers.has(failure?.name)
          );
          if (unexpectedBlockers.length > 0) {
            console.error(JSON.stringify(unexpectedBlockers, null, 2));
            throw new Error("Readiness has non-evidence blockers.");
          }
          if (payload.launchDecision === "blocked") {
            console.warn(JSON.stringify(payload.blockingFailures ?? [], null, 2));
          }
          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            `- Launch decision: ${payload.launchDecision}\n- Readiness HTTP status: ${httpStatus}\n- Frontend version: ${payload.versions?.frontendVersion ?? "unknown"}\n- Worker version: ${payload.versions?.workerVersion ?? "unknown"}\n- Blocking failures: ${(payload.blockingFailures ?? []).length}\n- Warnings: ${(payload.warnings ?? []).length}\n`
          );
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `launch_decision=${payload.launchDecision}\n`);
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: readiness-payload
          path: readiness.json

  backend-health:
    if: ${{ ((github.event_name == 'workflow_dispatch' && inputs.backend_health_url != '') || (github.event_name != 'workflow_dispatch' && vars.BACKEND_HEALTH_URL != '')) && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    needs: readiness-check
    steps:
      - name: Verify backend worker and cleanup health
        shell: bash
        run: |
          curl --fail --silent "${{ env.BACKEND_HEALTH_URL }}" > backend-health.json
          node <<'NODE'
          const fs = require("fs");
          const payload = JSON.parse(fs.readFileSync("backend-health.json", "utf8"));

          if (
            payload.workerReady !== true ||
            payload.directExecution !== true ||
            payload.workerStale === true
          ) {
            console.error(JSON.stringify(payload, null, 2));
            throw new Error("Backend worker is not healthy enough for certification");
          }

          if (payload.cleanup?.lastCleanupError) {
            console.error(JSON.stringify(payload.cleanup, null, 2));
            throw new Error("Cleanup worker reported an error");
          }

          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              `- Backend worker ready: ${payload.workerReady}`,
              `- Backend direct execution: ${payload.directExecution}`,
              `- Worker stale: ${payload.workerStale}`,
              `- Last cleanup success: ${payload.cleanup?.lastCleanupSuccessAt ?? "unknown"}`,
              "",
            ].join("\n")
          );
          NODE
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-health-payload
          path: backend-health.json

  preview-smoke:
    if: ${{ ((github.event_name == 'workflow_dispatch' && inputs.base_url != '') || (github.event_name != 'workflow_dispatch' && vars.PRODUCTION_BASE_URL != '')) && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    needs:
      - readiness-check
      - backend-health
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --workspaces=false
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e -- tests/e2e/deployed-smoke.spec.ts
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.BASE_URL }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: deployed-playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results

  launch-summary:
    runs-on: ubuntu-latest
    needs:
      - readiness-check
      - backend-health
      - preview-smoke
    if: always()
    steps:
      - name: Preflight production publish configuration
        if: ${{ env.BASE_URL != '' }}
        shell: bash
        run: |
          missing=0
          echo "## Runtime evidence publish configuration" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -z "${BASE_URL}" ]; then
            echo "- Missing repository variable: PRODUCTION_BASE_URL" >> "$GITHUB_STEP_SUMMARY"
            missing=1
          else
            echo "- PRODUCTION_BASE_URL/base_url: configured" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -z "${BACKEND_HEALTH_URL}" ]; then
            echo "- Missing repository variable or workflow input: BACKEND_HEALTH_URL / backend_health_url" >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=Missing BACKEND_HEALTH_URL::Set GitHub Actions repository variable BACKEND_HEALTH_URL to the Railway backend /health URL, or pass backend_health_url when using workflow_dispatch."
            missing=1
          else
            echo "- BACKEND_HEALTH_URL/backend_health_url: configured" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -z "${AI_CORE_SHARED_SECRET}" ]; then
            echo "- Missing repository secret: AI_CORE_SHARED_SECRET" >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=Missing AI_CORE_SHARED_SECRET::Set GitHub Actions repository secret AI_CORE_SHARED_SECRET to the same value configured on the Railway backend service."
            missing=1
          else
            echo "- AI_CORE_SHARED_SECRET: configured" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$missing" -ne 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Production certification is strict: hosted verification and launch certification cannot pass without backend publish configuration." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Build provider security evidence checklist
        if: ${{ env.BASE_URL != '' }}
        shell: bash
        run: |
          cat > provider-security-evidence.md <<'EOF'
          # Provider Security Evidence Checklist

          Generated by the Post Deploy Verify workflow. Attach screenshots, dashboard links, or release-note references before broad production launch certification.

          | Provider surface | Required proof | Evidence link / note | Owner | Status |
          |---|---|---|---|---|
          | Vercel Firewall/WAF | Request filtering, bot/DDoS controls, and any `/api/*`, auth, billing, or readiness throttles. | TODO | NextStop AI maintainer | Required |
          | Railway backend | Public service URL, expected health route exposure, resource limits, restart policy, and any request/connection controls. | TODO | NextStop AI maintainer | Required |
          | Supabase auth | Abuse protections, redirect URL allowlist, enabled providers, and service-role key server-only proof. | TODO | NextStop AI maintainer | Required |
          | Razorpay webhooks | Signing secret configured, retry/failure visibility, duplicate-event handling, and alert owner. | TODO | NextStop AI maintainer | Required |
          | Sentry/OTLP | Production ingestion, 5xx/webhook/readiness alert owner, and one event/span from this release. | TODO | NextStop AI maintainer | Required |

          Any unavailable provider-side control must be converted into an explicit accepted risk with owner, expiry, and compensating control.
          EOF
          echo "- Provider security evidence checklist generated as an artifact." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload provider security evidence checklist
        if: ${{ env.BASE_URL != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: provider-security-evidence-checklist
          path: provider-security-evidence.md

      - name: Build hosted verification payload
        shell: bash
        env:
          MANUAL_RESULTS_JSON: ${{ github.event_name == 'workflow_dispatch' && inputs.hosted_verification_results_json || '' }}
          READINESS_RESULT: ${{ needs.readiness-check.result }}
          BACKEND_RESULT: ${{ needs.backend-health.result }}
          PREVIEW_RESULT: ${{ needs.preview-smoke.result }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const workflowName = process.env.GITHUB_EVENT_NAME;
          const readinessResult = process.env.READINESS_RESULT;
          const backendResult = process.env.BACKEND_RESULT;
          const previewResult = process.env.PREVIEW_RESULT;
          const manualJson = process.env.MANUAL_RESULTS_JSON?.trim();

          const scenarioStatusFromJob = (result) => {
            if (result === "success") return "pass";
            if (result === "failure") return "fail";
            if (result === "cancelled") return "blocked";
            if (result === "skipped") return "blocked";
            return "unknown";
          };

          const automatedScenarios = {
            readiness_api: {
              status: scenarioStatusFromJob(readinessResult),
              detail:
                readinessResult === "success"
                  ? "Readiness route and readiness script passed."
                  : `Readiness job result: ${readinessResult}.`,
              checkedAt: new Date().toISOString(),
            },
            backend_health: {
              status: scenarioStatusFromJob(backendResult),
              detail:
                backendResult === "success"
                  ? "Backend worker heartbeat and cleanup health passed."
                  : `Backend health job result: ${backendResult}.`,
              checkedAt: new Date().toISOString(),
            },
            deployed_smoke: {
              status: scenarioStatusFromJob(previewResult),
              detail:
                previewResult === "success"
                  ? "Deployed smoke test passed against the app root and login."
                  : `Preview smoke job result: ${previewResult}.`,
              checkedAt: new Date().toISOString(),
            },
          };

          let manualScenarios = {};

          if (manualJson) {
            try {
              const parsed = JSON.parse(manualJson);
              if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
                manualScenarios = parsed;
              }
            } catch (error) {
              console.error(`Invalid hosted_verification_results_json: ${error.message}`);
              process.exit(1);
            }
          }

          const scenarios = { ...automatedScenarios, ...manualScenarios };
          const entries = Object.entries(scenarios);
          const statuses = entries.map(([, value]) => value?.status ?? "unknown");
          const firstNonPass = entries.find(([, value]) => value?.status && value.status !== "pass");
          let overallStatus = "unknown";

          if (statuses.includes("blocked")) {
            overallStatus = "blocked";
          } else if (statuses.includes("fail")) {
            overallStatus = "fail";
          } else if (statuses.length > 0 && statuses.every((status) => status === "pass")) {
            overallStatus = "pass";
          } else if (statuses.some((status) => status === "partial" || status === "unknown")) {
            overallStatus = "partial";
          }

          const payload = {
            status: overallStatus,
            scenario: firstNonPass?.[0] ?? null,
            failureReason:
              firstNonPass?.[1]?.detail ??
              (overallStatus === "pass"
                ? null
                : "Some hosted durable-flow scenarios are still pending or failed."),
            source: workflowName === "workflow_dispatch" ? "manual_workflow_dispatch" : "post_deploy_workflow",
            lastHostedVerificationAt: new Date().toISOString(),
            scenarios,
          };

          fs.writeFileSync("hosted-verification.json", JSON.stringify(payload, null, 2));
          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            `- Hosted verification status: ${payload.status}\n- Hosted verification source: ${payload.source}\n`
          );
          NODE

      - name: Upload hosted verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: hosted-verification-payload
          path: hosted-verification.json

      - name: Require hosted verification publish configuration
        if: ${{ env.BASE_URL != '' }}
        shell: bash
        run: |
          if [ -z "${BACKEND_HEALTH_URL}" ]; then
            echo "::error title=Missing BACKEND_HEALTH_URL::Set GitHub Actions repository variable BACKEND_HEALTH_URL to the Railway backend /health URL, or pass backend_health_url when using workflow_dispatch."
            exit 1
          fi
          if [ -z "${AI_CORE_SHARED_SECRET}" ]; then
            echo "::error title=Missing AI_CORE_SHARED_SECRET::Set GitHub Actions repository secret AI_CORE_SHARED_SECRET to the same value configured on the Railway backend service."
            exit 1
          fi

      - name: Publish hosted verification to backend runtime status
        if: ${{ env.BASE_URL != '' }}
        shell: bash
        run: |
          RUNTIME_BASE="${BACKEND_HEALTH_URL%/health}"
          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AI_CORE_SHARED_SECRET}" \
            -X POST \
            "${RUNTIME_BASE}/runtime/hosted-verification" \
            --data @hosted-verification.json > /dev/null

      - name: Verify hosted verification publish
        if: ${{ env.BASE_URL != '' }}
        shell: bash
        run: |
          RUNTIME_BASE="${BACKEND_HEALTH_URL%/health}"
          curl --fail --silent --show-error "${RUNTIME_BASE}/health" > backend-health-after-hosted.json
          READINESS_STATUS="$(curl --silent --show-error --output readiness-after-hosted.json --write-out "%{http_code}" "${BASE_URL}/api/health/readiness")"
          READINESS_STATUS="$READINESS_STATUS" node <<'NODE'
          const fs = require("fs");
          const hosted = JSON.parse(fs.readFileSync("hosted-verification.json", "utf8"));
          const backend = JSON.parse(fs.readFileSync("backend-health-after-hosted.json", "utf8"));
          const readiness = JSON.parse(fs.readFileSync("readiness-after-hosted.json", "utf8"));
          const readinessStatus = process.env.READINESS_STATUS;

          if (backend.hostedVerification?.lastHostedVerificationStatus !== hosted.status) {
            throw new Error("Backend health did not reflect the published hosted verification status.");
          }

          if (hosted.status === "pass") {
            const hostedCheck = (readiness.productionEvidenceChecks ?? []).find(
              (entry) => entry?.name === "Hosted verification"
            );
            const hostedBlocker = (readiness.blockingFailures ?? []).find(
              (entry) => entry?.name === "Hosted verification"
            );

            if (readiness.hostedVerification?.lastHostedVerificationStatus !== "pass") {
              throw new Error("Readiness did not expose hosted verification pass status.");
            }

            if (hostedCheck?.status !== "pass") {
              throw new Error("Readiness hosted verification evidence check is not passing.");
            }

            if (hostedBlocker) {
              throw new Error("Readiness still lists Hosted verification as a blocker.");
            }
          }

          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            `- Hosted verification publish verified: ${hosted.status}\n- Readiness after hosted publish HTTP status: ${readinessStatus}\n`
          );
          NODE

      - name: Validate launch certification prerequisites
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.certify_launch }}
        shell: bash
        env:
          READINESS_RESULT: ${{ needs.readiness-check.result }}
          BACKEND_RESULT: ${{ needs.backend-health.result }}
          PREVIEW_RESULT: ${{ needs.preview-smoke.result }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const hosted = JSON.parse(fs.readFileSync("hosted-verification.json", "utf8"));
          const readiness = JSON.parse(fs.readFileSync("readiness-after-hosted.json", "utf8"));

          const productionEvidenceChecks = readiness.productionEvidenceChecks ?? [];
          const blockingFailures = readiness.blockingFailures ?? [];
          const hostedCheck = productionEvidenceChecks.find(
            (entry) => entry?.name === "Hosted verification"
          );
          const productionObservabilityCheck = productionEvidenceChecks.find(
            (entry) => entry?.name === "Production observability"
          );
          const unexpectedBlockers = blockingFailures.filter(
            (entry) => entry?.name !== "Launch certification"
          );

          const hostedVerificationPassed =
            hosted.status === "pass" &&
            hostedCheck?.status === "pass" &&
            readiness.hostedVerification?.lastHostedVerificationStatus === "pass";
          const productionObservabilityReady =
            productionObservabilityCheck?.status === "pass" &&
            readiness.aiCoreHealth?.observability?.environment === "production" &&
            readiness.aiCoreHealth?.observability?.sentryConfigured === true &&
            readiness.aiCoreHealth?.observability?.otlpConfigured === true;
          const readinessServiceGreen = process.env.READINESS_RESULT === "success";
          const backendGreen = process.env.BACKEND_RESULT === "success";
          const smokeGreen = process.env.PREVIEW_RESULT === "success";
          const noUnexpectedBlockers = unexpectedBlockers.length === 0;
          const operationalProofComplete =
            backendGreen && smokeGreen && productionObservabilityReady;
          const validationGreen =
            readinessServiceGreen &&
            backendGreen &&
            smokeGreen &&
            productionObservabilityReady &&
            noUnexpectedBlockers;
          const certifiable =
            validationGreen && hostedVerificationPassed && operationalProofComplete;

          const prerequisites = {
            certifiable,
            validationGreen,
            hostedVerificationPassed,
            operationalProofComplete,
            readinessServiceGreen,
            backendGreen,
            smokeGreen,
            productionObservabilityReady,
            noUnexpectedBlockers,
            unexpectedBlockers: unexpectedBlockers.map((entry) => ({
              name: entry?.name ?? "unknown",
              detail: entry?.detail ?? null,
            })),
          };

          fs.writeFileSync(
            "launch-certification-prerequisites.json",
            JSON.stringify(prerequisites, null, 2)
          );
          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            `- Launch certifiable: ${prerequisites.certifiable}\n- Production observability ready: ${prerequisites.productionObservabilityReady}\n- Unexpected readiness blockers before certification: ${prerequisites.unexpectedBlockers.length}\n`
          );
          NODE

      - name: Upload launch certification prerequisites artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.certify_launch }}
        uses: actions/upload-artifact@v4
        with:
          name: launch-certification-prerequisites
          path: launch-certification-prerequisites.json

      - name: Build launch certification payload
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.certify_launch }}
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const prerequisites = JSON.parse(
            fs.readFileSync("launch-certification-prerequisites.json", "utf8")
          );
          const status = prerequisites.certifiable ? "certified" : "blocked";

          const payload = {
            status,
            certifiedBy: process.env.CERTIFICATION_OWNER || process.env.GITHUB_ACTOR,
            certificationNotes:
              process.env.CERTIFICATION_NOTES ||
              (status === "certified"
                ? "Launch certification issued from post-deploy verification."
                : "Launch certification attempted before all evidence was green."),
            validationGreen: prerequisites.validationGreen,
            hostedVerificationPassed: prerequisites.hostedVerificationPassed,
            operationalProofComplete: prerequisites.operationalProofComplete,
            readinessLaunchDecision: process.env.LAUNCH_DECISION || null,
            lastLaunchCertificationAt: new Date().toISOString(),
          };

          fs.writeFileSync("launch-certification.json", JSON.stringify(payload, null, 2));
          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            `- Launch certification status: ${payload.status}\n- Validation green: ${payload.validationGreen}\n- Hosted verification passed: ${payload.hostedVerificationPassed}\n- Operational proof complete: ${payload.operationalProofComplete}\n`
          );
          NODE
        env:
          CERTIFICATION_OWNER: ${{ inputs.certification_owner }}
          CERTIFICATION_NOTES: ${{ inputs.certification_notes }}
          LAUNCH_DECISION: ${{ needs.readiness-check.outputs.launch_decision }}

      - name: Upload launch certification artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.certify_launch }}
        uses: actions/upload-artifact@v4
        with:
          name: launch-certification-payload
          path: launch-certification.json

      - name: Publish launch certification to backend runtime status
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.certify_launch && env.BACKEND_HEALTH_URL != '' && env.AI_CORE_SHARED_SECRET != '' }}
        shell: bash
        run: |
          RUNTIME_BASE="${BACKEND_HEALTH_URL%/health}"
          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AI_CORE_SHARED_SECRET}" \
            -X POST \
            "${RUNTIME_BASE}/runtime/launch-certification" \
            --data @launch-certification.json > /dev/null

      - name: Verify launch certification publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.certify_launch && env.BACKEND_HEALTH_URL != '' && env.AI_CORE_SHARED_SECRET != '' }}
        shell: bash
        run: |
          RUNTIME_BASE="${BACKEND_HEALTH_URL%/health}"
          curl --fail --silent --show-error "${RUNTIME_BASE}/health" > backend-health-after-launch-certification.json
          READINESS_STATUS="$(curl --silent --show-error --output readiness-after-launch-certification.json --write-out "%{http_code}" "${BASE_URL}/api/health/readiness")"
          READINESS_STATUS="$READINESS_STATUS" node <<'NODE'
          const fs = require("fs");
          const certification = JSON.parse(fs.readFileSync("launch-certification.json", "utf8"));
          const backend = JSON.parse(
            fs.readFileSync("backend-health-after-launch-certification.json", "utf8")
          );
          const readiness = JSON.parse(
            fs.readFileSync("readiness-after-launch-certification.json", "utf8")
          );
          const readinessStatus = process.env.READINESS_STATUS;

          if (
            backend.launchCertification?.lastLaunchCertificationStatus !==
            certification.status
          ) {
            throw new Error("Backend health did not reflect the published launch certification status.");
          }

          if (certification.status === "certified") {
            const launchCertificationCheck = (readiness.productionEvidenceChecks ?? []).find(
              (entry) => entry?.name === "Launch certification"
            );
            const launchCertificationBlocker = (readiness.blockingFailures ?? []).find(
              (entry) => entry?.name === "Launch certification"
            );

            if (readinessStatus !== "200") {
              throw new Error(`Readiness after launch certification returned HTTP ${readinessStatus}.`);
            }
            if (readiness.launchDecision !== "ready") {
              throw new Error("Readiness launchDecision is not ready after launch certification.");
            }
            if (
              readiness.launchCertification?.lastLaunchCertificationStatus !== "certified" ||
              readiness.launchCertification?.validationGreen !== true ||
              readiness.launchCertification?.hostedVerificationPassed !== true ||
              readiness.launchCertification?.operationalProofComplete !== true
            ) {
              throw new Error("Readiness did not expose complete launch certification proof.");
            }
            if (launchCertificationCheck?.status !== "pass") {
              throw new Error("Readiness launch certification evidence check is not passing.");
            }
            if (launchCertificationBlocker) {
              throw new Error("Readiness still lists Launch certification as a blocker.");
            }
          }

          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            `- Launch certification publish verified: ${certification.status}\n- Readiness after launch certification HTTP status: ${readinessStatus}\n`
          );
          NODE

      - name: Write launch summary
        shell: bash
        run: |
          echo "# Post-deploy verification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base URL: ${{ env.BASE_URL || 'not configured' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Readiness check: ${{ needs.readiness-check.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend health: ${{ needs.backend-health.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview smoke: ${{ needs.preview-smoke.result }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "${{ env.BASE_URL }}" ]; then
            echo "- Warning: set repository variable PRODUCTION_BASE_URL to enable automatic post-deploy verification on main." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -z "${{ env.BACKEND_HEALTH_URL }}" ]; then
            echo "- Warning: set repository variable BACKEND_HEALTH_URL to enable backend certification checks." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -z "${{ env.AI_CORE_SHARED_SECRET }}" ]; then
            echo "- Warning: set repository secret AI_CORE_SHARED_SECRET to publish hosted verification and launch certification status into backend runtime state." >> "$GITHUB_STEP_SUMMARY"
          fi

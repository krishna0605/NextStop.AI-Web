name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  APP_URL: http://127.0.0.1:3100
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: public-anon-key
  SUPABASE_SERVICE_ROLE_KEY: service-role-key
  GOOGLE_CLIENT_ID: google-client-id
  GOOGLE_CLIENT_SECRET: google-client-secret
  NOTION_CLIENT_ID: notion-client-id
  NOTION_CLIENT_SECRET: notion-client-secret
  NOTION_OAUTH_STATE_SECRET: notion-state-secret
  RAZORPAY_KEY_ID: rzp_test_key
  RAZORPAY_KEY_SECRET: rzp_secret
  RAZORPAY_PLAN_ID: plan_test
  RAZORPAY_WEBHOOK_SECRET: webhook_secret
  TRANSCRIPT_STORAGE_MODE: disabled

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test:repo-contract
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build

  unit-and-route-tests:
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test -- --coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: coverage

  browser-smoke:
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- tests/e2e/smoke.spec.ts

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results

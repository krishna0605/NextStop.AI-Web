services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend-api:
    build:
      context: ./backend
    working_dir: /app
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - ./backend/.env.local
    environment:
      NODE_ENV: development
      PORT: 8080
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:${LOCAL_FRONTEND_PORT:-3000}
      NEXTSTOP_WEB_APP_URL: http://localhost:${LOCAL_FRONTEND_PORT:-3000}
      AI_CORE_SHARED_SECRET: nextstop-local-shared-secret
      AI_PIPELINE_MODE: railway_remote
      AI_INLINE_FALLBACK_ENABLED: "false"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend-worker:
    build:
      context: ./backend
    working_dir: /app
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - ./backend/.env.local
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:${LOCAL_FRONTEND_PORT:-3000}
      NEXTSTOP_WEB_APP_URL: http://localhost:${LOCAL_FRONTEND_PORT:-3000}
      AI_CORE_SHARED_SECRET: nextstop-local-shared-secret
      AI_PIPELINE_MODE: railway_remote
      AI_INLINE_FALLBACK_ENABLED: "false"
    depends_on:
      redis:
        condition: service_healthy
      backend-api:
        condition: service_healthy

  backend-cleanup:
    build:
      context: ./backend
    working_dir: /app
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - ./backend/.env.local
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:${LOCAL_FRONTEND_PORT:-3000}
      NEXTSTOP_WEB_APP_URL: http://localhost:${LOCAL_FRONTEND_PORT:-3000}
      AI_CORE_SHARED_SECRET: nextstop-local-shared-secret
      AI_PIPELINE_MODE: railway_remote
      AI_INLINE_FALLBACK_ENABLED: "false"
      CLEANUP_INTERVAL_MS: 300000
    depends_on:
      redis:
        condition: service_healthy
      backend-api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    working_dir: /app
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - ./frontend/.env.local
    environment:
      NODE_ENV: development
      APP_URL: http://localhost:${LOCAL_FRONTEND_PORT:-3000}
      NEXT_PUBLIC_APP_URL: http://localhost:${LOCAL_FRONTEND_PORT:-3000}
      NEXT_PUBLIC_BACKEND_URL: http://localhost:${LOCAL_BACKEND_PORT:-8080}
      AI_CORE_API_URL: http://backend-api:8080
      AI_CORE_SHARED_SECRET: nextstop-local-shared-secret
      AI_PIPELINE_MODE: railway_remote
      AI_INLINE_FALLBACK_ENABLED: "false"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 15s

volumes:
  frontend_node_modules:
  backend_node_modules:
